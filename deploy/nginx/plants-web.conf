# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name node76.cs.colman.ac.il;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name node76.cs.colman.ac.il;

    # TLS – certbot will populate these lines automatically.
    # If using self-signed fallback, point these at:
    #   /home/node76/apps/plants-web/certs/cert.pem
    #   /home/node76/apps/plants-web/certs/key.pem
    # ssl_certificate     ...;
    # ssl_certificate_key ...;

    # Serve the React SPA
    root /home/node76/apps/plants-web/client/dist;
    index index.html;

    client_max_body_size 20M;

    # SPA fallback – any unknown path returns index.html for client-side routing
    location / {
        try_files $uri /index.html;
    }

    # Proxy API requests to Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Proxy uploaded images
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy Swagger docs
    location /api-docs/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
